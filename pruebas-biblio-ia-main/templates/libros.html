<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Libros · Biblioteca IA</title>
    <meta name="description" content="Administración completa del catálogo de libros.">
    <meta property="og:title" content="Gestión de Libros · Biblioteca IA">
    <meta property="og:description" content="Administración completa del catálogo de libros.">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <header class="header">
        <div class="header-top">
            <div class="logo"><span class="logo-icon">📚</span><h1>Gestión de Libros</h1></div>
            <div id="user-menu"></div>
        </div>

        <nav class="header-nav"><div class="header-nav-inner">
            <a href="/" class="nav-link">Inicio</a>
            <a href="/checkin" class="nav-link">Check-in</a>
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <a href="/registro" class="nav-link">Registrar Alumno</a>
            <a href="/libros" class="nav-link active">Libros</a>
        </div></nav>
    </header>

    <!-- MODAL AGREGAR LIBRO -->
    <div id="modal-agregar" class="modal-agregar">
        <div class="modal-agregar-content">
            <span class="close-modal" onclick="cerrarModalAgregar()" style="position:absolute;top:1rem;right:1.2rem;font-size:1.5rem;cursor:pointer;color:var(--text-muted);">&times;</span>
            <!-- Cuerpo scrollable -->
            <div class="modal-agregar-body">
                <h3>📖 Agregar Libro Manualmente</h3>
                <div class="form-group">
                    <label>Título <span class="campo-requerido">*</span></label>
                    <input type="text" id="nuevo-titulo" placeholder="Ej: Biología Molecular" class="form-input">
                </div>
                <div class="form-group">
                    <label>Autor <span class="campo-requerido">*</span></label>
                    <input type="text" id="nuevo-autor" placeholder="Ej: Bruce Alberts" class="form-input">
                </div>
                <div class="form-group">
                    <label>Editorial <span class="campo-requerido">*</span></label>
                    <input type="text" id="nuevo-editorial" placeholder="Ej: Santillana" class="form-input">
                </div>
                <div class="form-group">
                    <div class="capitulos-label-row">
                        <label>Capítulos <span style="color:var(--text-muted);font-size:0.78rem">(opcional)</span></label>
                        <button type="button" class="btn-add-cap" onclick="agregarCapituloInput()">＋ Agregar capítulo</button>
                    </div>
                    <div id="capitulos-lista" class="capitulos-lista"></div>
                    <p id="capitulos-vacio" class="capitulos-hint">Sin capítulos — tocá el botón para agregar</p>
                </div>
                <div class="form-group">
                    <label>Stock inicial</label>
                    <input type="number" id="nuevo-stock" value="10" min="1" class="form-input" style="max-width:100px">
                </div>
                <div id="agregar-error" class="error-msg" style="display:none;"></div>
                <div id="agregar-ok" class="success-msg" style="display:none;"></div>
            </div>
            <!-- Footer fijo -->
            <div class="modal-agregar-footer">
                <button class="btn-cancelar" onclick="cerrarModalAgregar()">Cancelar</button>
                <button class="btn-primary" onclick="guardarLibro()">💾 Guardar Libro</button>
            </div>
        </div>
    </div>

    <main class="admin-main">
        <div class="admin-toolbar">
            <input type="text" id="admin-search" placeholder="🔍 Buscar..." class="search-input">
            <button class="btn-primary" onclick="abrirModalAgregar()" style="padding:10px 18px;font-size:0.9rem;">➕ Agregar Libro</button>
            <select id="admin-per-page">
                <option value="10">10 por página</option>
                <option value="25">25</option>
                <option value="50">50</option>
            </select>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>Editorial</th>
                        <th>Stock</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="admin-tbody"></tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </main>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/libros.js"></script>
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/static/sw.js');</script>
</body>
</html>
